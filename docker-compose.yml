services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mental_health}
      POSTGRES_USER: ${POSTGRES_USER:-mental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mental}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-mental}:${POSTGRES_PASSWORD:-mental}@postgres:5432/${POSTGRES_DB:-mental_health}
      REDIS_URL: redis://redis:6379/0
      AI_MAX_CONCURRENCY: 8
      AI_MAX_RETRIES: 2
      UVICORN_WORKERS: 4
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - community_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  sla-worker:
    image: mental_health_website-api:latest
    command: ["sh", "-c", "unset PROMETHEUS_MULTIPROC_DIR; python -m backend.services.sla_worker"]
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-mental}:${POSTGRES_PASSWORD:-mental}@postgres:5432/${POSTGRES_DB:-mental_health}
      REDIS_URL: redis://redis:6379/0
      RISK_SLA_SCAN_SECONDS: 30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      api:
        condition: service_healthy
      sla-worker:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-8088}:80"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-mental}:${POSTGRES_PASSWORD:-mental}@postgres:5432/${POSTGRES_DB:-mental_health}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.70.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"

  grafana:
    image: grafana/grafana:12.0.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-mental-health-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3001}:3000"

volumes:
  postgres_data:
  community_uploads:
  prometheus_data:
  grafana_data:
