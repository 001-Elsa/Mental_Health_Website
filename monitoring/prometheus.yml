global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: mental-health-api
    static_configs:
      - targets: ["api:8000"]
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
  - job_name: risk-sla-worker
    static_configs:
      - targets: ["sla-worker:9101"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
