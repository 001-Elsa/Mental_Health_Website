name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mental_health_test
          POSTGRES_USER: mental_test
          POSTGRES_PASSWORD: mental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mental_test -d mental_health_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r environment/requirements.txt
      - run: alembic upgrade head
      - run: pytest -q
        env:
          PYTHONPATH: .
          # Keep the development-only verification-code response enabled for
          # API tests while exercising production PostgreSQL and Redis.
          APP_ENV: development
          DATABASE_URL: postgresql+psycopg2://mental_test:mental_test@localhost:5432/mental_health_test
          REDIS_URL: redis://localhost:6379/15
          SECRET_KEY: ci-only-secret
          DEEPSEEK_API_KEY: ""

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
